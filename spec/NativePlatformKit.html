document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"077028ad-61a9-4961-b875-7ebfabddda86\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"b87653ad-b3d3-4ad5-b6e6-82aef934e651\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"6ecf0027-536d-40b5-970e-e8dcff4104d4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box}\n  body{margin:0}\n  ::selection{background:rgba(246,42,82,.30)}\n  @keyframes npk-spin{to{transform:rotate(360deg)}}\n  @keyframes npk-pulse{0%,100%{opacity:1}50%{opacity:.45}}\n  @keyframes npk-shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}\n  @keyframes npk-indet{0%{left:-40%;width:40%}50%{width:55%}100%{left:100%;width:40%}}\n  @keyframes npk-livedot{0%{box-shadow:0 0 0 0 rgba(120,220,150,.5)}70%{box-shadow:0 0 0 7px rgba(120,220,150,0)}100%{box-shadow:0 0 0 0 rgba(120,220,150,0)}}\n  @keyframes npk-rowin{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}\n  @keyframes npk-track{0%{left:2px}100%{left:calc(100% - 16px)}}\n  ::-webkit-scrollbar{width:11px;height:11px}\n  ::-webkit-scrollbar-thumb{background:rgba(150,140,180,.3);border-radius:99px;border:3px solid transparent;background-clip:content-box}\n  ::-webkit-scrollbar-track{background:transparent}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:#0b0911;font-family:'Hanken Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased\">\n<div style=\"{{ themeVars }}\">\n\n  <!-- ===================== CONTROL BAR ===================== -->\n  <div style=\"position:sticky;top:0;z-index:50;background:var(--npk-color-surface-container,#16131f);border-bottom:1px solid var(--npk-color-outline-variant,#2c2738);backdrop-filter:blur(12px)\">\n    <div style=\"max-width:1480px;margin:0 auto;padding:14px 32px;display:flex;align-items:center;gap:28px;flex-wrap:wrap\">\n      <div style=\"display:flex;align-items:center;gap:13px;margin-right:auto\">\n        <div style=\"width:34px;height:34px;border-radius:var(--npk-radius-md,10px);background:linear-gradient(135deg,var(--npk-color-primary,#f4889b),var(--npk-color-tertiary,#ffb59e));display:flex;align-items:center;justify-content:center;font-family:'Fraunces';font-weight:800;font-size:18px;color:var(--npk-color-on-primary,#3a0f1a)\">N<\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Fraunces';font-weight:700;font-size:16px;letter-spacing:-.01em;color:var(--npk-color-on-surface,#e6eaf2);line-height:1\">NativePlatformKit<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono';font-size:10.5px;color:var(--npk-color-on-surface-variant,#a2aabc);margin-top:3px\">v1.0 · Compose ⇄ Web · live components<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:7px\">\n        <span style=\"font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--npk-color-on-surface-variant,#a2aabc);margin-right:3px\">Mode<\u002Fspan>\n        <div style=\"display:inline-flex;padding:3px;gap:3px;background:var(--npk-color-surface-container-highest,#272234);border-radius:var(--npk-radius-sm,7px)\">\n          <sc-for list=\"{{ modeSeg }}\" as=\"o\" hint-placeholder-count=\"2\">\n            <button onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:7px\">\n        <span style=\"font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--npk-color-on-surface-variant,#a2aabc);margin-right:3px\">Skin<\u002Fspan>\n        <div style=\"display:inline-flex;padding:3px;gap:3px;background:var(--npk-color-surface-container-highest,#272234);border-radius:var(--npk-radius-sm,7px)\">\n          <sc-for list=\"{{ skinSeg }}\" as=\"o\" hint-placeholder-count=\"2\">\n            <button onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:7px\">\n        <span style=\"font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--npk-color-on-surface-variant,#a2aabc);margin-right:3px\">Density<\u002Fspan>\n        <div style=\"display:inline-flex;padding:3px;gap:3px;background:var(--npk-color-surface-container-highest,#272234);border-radius:var(--npk-radius-sm,7px)\">\n          <sc-for list=\"{{ densitySeg }}\" as=\"o\" hint-placeholder-count=\"2\">\n            <button onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1480px;margin:0 auto;padding:0 32px 12px;display:flex;gap:6px;flex-wrap:wrap\">\n      <sc-for list=\"{{ boardNav }}\" as=\"b\" hint-placeholder-count=\"8\">\n        <a href=\"{{ b.href }}\" style=\"{{ b.style }}\">{{ b.label }}<\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1480px;margin:0 auto;padding:0 32px 120px\">\n\n  <!-- ===================== HERO / RATIONALE ===================== -->\n  <section style=\"padding:64px 0 24px\">\n    <div style=\"font-family:'JetBrains Mono';font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--npk-color-primary,#f4889b)\">Design system specification<\u002Fdiv>\n    <h1 style=\"font-family:'Fraunces';font-weight:800;font-size:clamp(40px,6vw,72px);line-height:1.02;letter-spacing:-.03em;margin:18px 0 0;color:var(--npk-color-on-surface,#eef2f9);max-width:18ch\">One token source. Two native platforms. Live by default.<\u002Fh1>\n    <p style=\"font-size:18px;line-height:1.55;max-width:62ch;margin:22px 0 0;color:var(--npk-color-on-surface-variant,#aeb6c8)\">NPK ships as a 1:1 pair — Jetpack Compose (<span style=\"font-family:'JetBrains Mono';font-size:14px;color:var(--npk-color-on-surface,#e6eaf2)\">NpkButton<\u002Fspan>) and framework-agnostic Web Components (<span style=\"font-family:'JetBrains Mono';font-size:14px;color:var(--npk-color-on-surface,#e6eaf2)\">npk-button<\u002Fspan>). Every token below emits as a CSS custom property <em style=\"font-style:normal;color:var(--npk-color-tertiary,#ffb59e)\">and<\u002Fem> a Compose theme value from a single source of truth. Toggle mode, skin and density above — the entire page re-skins from those tokens.<\u002Fp>\n    <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-top:28px\">\n      <sc-for list=\"{{ heroChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n        <div style=\"{{ c.style }}\">{{ c.text }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== BOARD 1 — TOKENS ===================== -->\n  <section id=\"board-tokens\" style=\"scroll-margin-top:120px;padding-top:56px\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--npk-color-outline-variant,#2c2738);padding-bottom:18px;margin-bottom:36px\">\n      <span style=\"font-family:'Fraunces';font-weight:800;font-size:15px;color:var(--npk-color-primary,#f4889b)\">01<\u002Fspan>\n      <h2 style=\"font-family:'Fraunces';font-weight:700;font-size:30px;letter-spacing:-.02em;margin:0;color:var(--npk-color-on-surface,#eef2f9)\">Design tokens<\u002Fh2>\n      <span style=\"font-size:14px;color:var(--npk-color-on-surface-variant,#a2aabc);margin-left:auto;max-width:42ch;text-align:right\">The single source. Everything downstream references these — no magic numbers.<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- COLOR: tonal ramps -->\n    <h3 style=\"font-family:'Fraunces';font-weight:600;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--npk-color-on-surface-variant,#a2aabc);margin:0 0 18px\">Tonal ramps · 0–100<\u002Fh3>\n    <div style=\"display:flex;flex-direction:column;gap:14px;margin-bottom:48px\">\n      <sc-for list=\"{{ ramps }}\" as=\"ramp\" hint-placeholder-count=\"5\">\n        <div style=\"display:flex;align-items:center;gap:16px\">\n          <div style=\"width:118px;flex:none\">\n            <div style=\"font-family:'Fraunces';font-weight:600;font-size:14px;color:var(--npk-color-on-surface,#e6eaf2)\">{{ ramp.name }}<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono';font-size:10px;color:var(--npk-color-on-surface-variant,#888fa4);margin-top:2px\">{{ ramp.token }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex:1;border-radius:var(--npk-radius-sm,7px);overflow:hidden;border:1px solid var(--npk-color-outline-variant,#2c2738)\">\n            <sc-for list=\"{{ ramp.steps }}\" as=\"s\" hint-placeholder-count=\"13\">\n              <div style=\"{{ s.style }}\">{{ s.step }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- COLOR: semantic roles (mode-dependent) -->\n    <h3 style=\"font-family:'Fraunces';font-weight:600;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--npk-color-on-surface-variant,#a2aabc);margin:0 0 18px\">Semantic roles <span style=\"font-family:'JetBrains Mono';font-weight:400;text-transform:none;letter-spacing:0;color:var(--npk-color-primary,#f4889b)\">// resolves live from mode + skin<\u002Fspan><\u002Fh3>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(192px,1fr));gap:12px;margin-bottom:48px\">\n      <sc-for list=\"{{ roleSwatches }}\" as=\"r\" hint-placeholder-count=\"16\">\n        <div style=\"border-radius:var(--npk-radius-md,10px);overflow:hidden;border:1px solid var(--npk-color-outline-variant,#2c2738)\">\n          <div style=\"{{ r.swatchStyle }}\">\n            <span style=\"{{ r.labelStyle }}\">{{ r.sample }}<\u002Fspan>\n            <span style=\"{{ r.contrastStyle }}\">{{ r.contrast }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:9px 11px;background:var(--npk-color-surface-container,#1b1727)\">\n            <div style=\"font-weight:600;font-size:12.5px;color:var(--npk-color-on-surface,#e6eaf2)\">{{ r.role }}<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono';font-size:9.5px;color:var(--npk-color-on-surface-variant,#888fa4);margin-top:2px\">{{ r.token }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- STATE LAYERS -->\n    <h3 style=\"font-family:'Fraunces';font-weight:600;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--npk-color-on-surface-variant,#a2aabc);margin:0 0 18px\">State-layer opacities<\u002Fh3>\n    <div style=\"display:flex;gap:12px;flex-wrap:wrap;margin-bottom:48px\">\n      <sc-for list=\"{{ stateLayers }}\" as=\"s\" hint-placeholder-count=\"6\">\n        <div style=\"flex:1;min-width:150px;border:1px solid var(--npk-color-outline-variant,#2c2738);border-radius:var(--npk-radius-md,10px);padding:16px;background:var(--npk-color-surface-container,#1b1727)\">\n          <div style=\"position:relative;height:40px;border-radius:var(--npk-radius-sm,7px);background:var(--npk-color-primary,#f4889b);overflow:hidden\">\n            <div style=\"{{ s.overlay }}\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-weight:600;font-size:13px;color:var(--npk-color-on-surface,#e6eaf2);margin-top:11px\">{{ s.name }}<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono';font-size:10px;color:var(--npk-color-on-surface-variant,#888fa4);margin-top:2px\">{{ s.token }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- TYPE SCALE -->\n    <h3 style=\"font-family:'Fraunces';font-weight:600;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--npk-color-on-surface-variant,#a2aabc);margin:0 0 18px\">Type scale · Archivo display · Hanken Grotesk text <span style=\"font-family:'JetBrains Mono';font-weight:400;text-transform:none;letter-spacing:0;color:var(--npk-color-primary,#f4889b)\">// {{ densityLabel }}<\u002Fspan><\u002Fh3>\n    <div style=\"display:flex;flex-direction:column;border:1px solid var(--npk-color-outline-variant,#2c2738);border-radius:var(--npk-radius-md,10px);overflow:hidden;margin-bottom:48px\">\n      <sc-for list=\"{{ typeScale }}\" as=\"t\" hint-placeholder-count=\"9\">\n        <div style=\"display:flex;align-items:baseline;gap:20px;padding:16px 20px;border-bottom:1px solid var(--npk-color-outline-variant,#2c2738);background:var(--npk-color-surface-container,#1b1727)\">\n          <div style=\"width:150px;flex:none;font-family:'JetBrains Mono';font-size:10.5px;color:var(--npk-color-on-surface-variant,#888fa4)\">{{ t.token }}<\u002Fdiv>\n          <div style=\"{{ t.style }}\">{{ t.sample }}<\u002Fdiv>\n          <div style=\"margin-left:auto;flex:none;font-family:'JetBrains Mono';font-size:10.5px;color:var(--npk-color-on-surface-variant,#888fa4);text-align:right\">{{ t.spec }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- SPACE + RADIUS -->\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-bottom:48px\">\n      <div>\n        <h3 style=\"font-family:'Fraunces';font-weight:600;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--npk-color-on-surface-variant,#a2aabc);margin:0 0 18px\">Spacing · 4dp grid<\u002Fh3>\n        <div style=\"display:flex;flex-direction:column;gap:9px\">\n          <sc-for list=\"{{ spaceScale }}\" as=\"s\" hint-placeholder-count=\"8\">\n            <div style=\"display:flex;align-items:center;gap:14px\">\n              <div style=\"width:96px;flex:none;font-family:'JetBrains Mono';font-size:10.5px;color:var(--npk-color-on-surface-variant,#888fa4)\">{{ s.token }}<\u002Fdiv>\n              <div style=\"{{ s.bar }}\"><\u002Fdiv>\n              <div style=\"font-family:'JetBrains Mono';font-size:11px;color:var(--npk-color-on-surface,#e6eaf2)\">{{ s.val }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <h3 style=\"font-family:'Fraunces';font-weight:600;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--npk-color-on-surface-variant,#a2aabc);margin:0 0 18px\">Shape · radius <span style=\"font-family:'JetBrains Mono';font-weight:400;text-transform:none;letter-spacing:0;color:var(--npk-color-primary,#f4889b)\">// {{ skinLabel }}<\u002Fspan><\u002Fh3>\n        <div style=\"display:flex;gap:14px;flex-wrap:wrap\">\n          <sc-for list=\"{{ radiusScale }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"text-align:center\">\n              <div style=\"{{ r.box }}\"><\u002Fdiv>\n              <div style=\"font-family:'JetBrains Mono';font-size:10px;color:var(--npk-color-on-surface,#e6eaf2);margin-top:8px\">{{ r.name }}<\u002Fdiv>\n              <div style=\"font-family:'JetBrains Mono';font-size:9.5px;color:var(--npk-color-on-surface-variant,#888fa4)\">{{ r.val }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Fraunces';font-weight:600;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--npk-color-on-surface-variant,#a2aabc);margin:34px 0 18px\">Elevation<\u002Fh3>\n        <div style=\"display:flex;gap:16px;flex-wrap:wrap\">\n          <sc-for list=\"{{ elevScale }}\" as=\"e\" hint-placeholder-count=\"6\">\n            <div style=\"text-align:center\">\n              <div style=\"{{ e.box }}\"><\u002Fdiv>\n              <div style=\"font-family:'JetBrains Mono';font-size:10px;color:var(--npk-color-on-surface,#e6eaf2);margin-top:10px\">{{ e.name }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- MOTION -->\n    <h3 style=\"font-family:'Fraunces';font-weight:600;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--npk-color-on-surface-variant,#a2aabc);margin:0 0 18px\">Motion · duration + easing <span style=\"font-family:'JetBrains Mono';font-weight:400;text-transform:none;letter-spacing:0;color:var(--npk-color-primary,#f4889b)\">// hover a track to replay · respects prefers-reduced-motion<\u002Fspan><\u002Fh3>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;margin-bottom:16px\">\n      <sc-for list=\"{{ motionTracks }}\" as=\"m\" hint-placeholder-count=\"4\">\n        <div onmouseenter=\"{{ m.replay }}\" style=\"border:1px solid var(--npk-color-outline-variant,#2c2738);border-radius:var(--npk-radius-md,10px);padding:16px;background:var(--npk-color-surface-container,#1b1727);cursor:pointer\">\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n            <div style=\"font-weight:600;font-size:13px;color:var(--npk-color-on-surface,#e6eaf2)\">{{ m.name }}<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono';font-size:10px;color:var(--npk-color-on-surface-variant,#888fa4)\">{{ m.dur }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"height:8px;margin:16px 0 8px;background:var(--npk-color-surface-container-highest,#272234);border-radius:99px;position:relative\">\n            <div style=\"{{ m.dotStyle }}\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono';font-size:9.5px;color:var(--npk-color-on-surface-variant,#888fa4)\">{{ m.easing }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== BOARD 2 — THEMING & MODES ===================== -->\n  <section id=\"board-theming\" style=\"scroll-margin-top:120px;padding-top:72px\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--npk-color-outline-variant,#2c2738);padding-bottom:18px;margin-bottom:20px\">\n      <span style=\"font-family:'Fraunces';font-weight:800;font-size:15px;color:var(--npk-color-primary,#f4889b)\">02<\u002Fspan>\n      <h2 style=\"font-family:'Fraunces';font-weight:700;font-size:30px;letter-spacing:-.02em;margin:0;color:var(--npk-color-on-surface,#eef2f9)\">Theming &amp; modes<\u002Fh2>\n      <span style=\"font-size:14px;color:var(--npk-color-on-surface-variant,#a2aabc);margin-left:auto;max-width:46ch;text-align:right\">The same sample screen, four token sets. One change at the source re-skins everything — try the toggles in the header.<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-size:13.5px;color:var(--npk-color-on-surface-variant,#a2aabc);margin:0 0 28px;font-family:'JetBrains Mono'\">NpkTheme(seed = sourceColor) → emits --npk-color-* (Web) + MaterialTheme.colorScheme (Compose) · dynamic-color reseeds the whole ramp from one input.<\u002Fp>\n\n    <div style=\"display:flex;gap:20px;flex-wrap:wrap\">\n      <sc-for list=\"{{ sampleThemes }}\" as=\"s\" hint-placeholder-count=\"4\">\n        <div style=\"flex:1;min-width:300px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px\">\n            <div style=\"font-family:'Fraunces';font-weight:600;font-size:13px;color:var(--npk-color-on-surface,#e6eaf2)\">{{ s.label }}<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono';font-size:10px;color:var(--npk-color-on-surface-variant,#888fa4)\">{{ s.note }}<\u002Fdiv>\n          <\u002Fdiv>\n          <!-- scoped mini-screen -->\n          <div style=\"{{ s.wrap }}\">\n            <div style=\"border-radius:var(--npk-radius-lg);overflow:hidden;border:1px solid var(--npk-color-outline-variant);box-shadow:var(--npk-elevation-2)\">\n              <div style=\"background:var(--npk-color-surface-container-high);padding:12px 14px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--npk-color-outline-variant)\">\n                <div style=\"width:22px;height:22px;border-radius:var(--npk-radius-sm);background:var(--npk-color-primary)\"><\u002Fdiv>\n                <div style=\"font-family:'Fraunces';font-weight:700;font-size:13px;color:var(--npk-color-on-surface)\">Revenue<\u002Fdiv>\n                <div style=\"margin-left:auto;display:flex;gap:5px\">\n                  <div style=\"width:16px;height:16px;border-radius:99px;background:var(--npk-color-secondary-container)\"><\u002Fdiv>\n                  <div style=\"width:16px;height:16px;border-radius:99px;background:var(--npk-color-tertiary-container)\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:var(--npk-color-surface);padding:14px\">\n                <div style=\"display:flex;gap:10px;margin-bottom:14px\">\n                  <div style=\"flex:1;background:var(--npk-color-primary-container);border-radius:var(--npk-radius-md);padding:11px\">\n                    <div style=\"font-size:10px;color:var(--npk-color-on-primary-container);opacity:.8\">MRR<\u002Fdiv>\n                    <div style=\"font-family:'Fraunces';font-weight:800;font-size:21px;color:var(--npk-color-on-primary-container);letter-spacing:-.02em\">$254k<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"flex:1;background:var(--npk-color-surface-container);border-radius:var(--npk-radius-md);padding:11px\">\n                    <div style=\"font-size:10px;color:var(--npk-color-on-surface-variant)\">Seats<\u002Fdiv>\n                    <div style=\"font-family:'Fraunces';font-weight:800;font-size:21px;color:var(--npk-color-on-surface);letter-spacing:-.02em\">1,282<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:flex-end;gap:5px;height:52px;margin-bottom:14px\">\n                  <div style=\"flex:1;height:40%;background:var(--npk-color-primary);border-radius:3px 3px 0 0\"><\u002Fdiv>\n                  <div style=\"flex:1;height:65%;background:var(--npk-color-primary);border-radius:3px 3px 0 0\"><\u002Fdiv>\n                  <div style=\"flex:1;height:50%;background:var(--npk-color-primary);border-radius:3px 3px 0 0\"><\u002Fdiv>\n                  <div style=\"flex:1;height:80%;background:var(--npk-color-secondary);border-radius:3px 3px 0 0\"><\u002Fdiv>\n                  <div style=\"flex:1;height:72%;background:var(--npk-color-primary);border-radius:3px 3px 0 0\"><\u002Fdiv>\n                  <div style=\"flex:1;height:100%;background:var(--npk-color-tertiary);border-radius:3px 3px 0 0\"><\u002Fdiv>\n                  <div style=\"flex:1;height:88%;background:var(--npk-color-primary);border-radius:3px 3px 0 0\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:8px;align-items:center\">\n                  <button style=\"border:none;background:var(--npk-color-primary);color:var(--npk-color-on-primary);font:600 12px 'Hanken Grotesk';padding:8px 14px;border-radius:var(--npk-radius-button,12px);cursor:pointer\">Export<\u002Fbutton>\n                  <div style=\"font-size:11px;padding:5px 10px;border-radius:var(--npk-radius-full);background:var(--npk-color-success-container);color:var(--npk-color-on-success-container);font-weight:600\">● Live<\u002Fdiv>\n                  <div style=\"font-size:11px;padding:5px 10px;border-radius:var(--npk-radius-full);border:1px solid var(--npk-color-outline);color:var(--npk-color-on-surface-variant);font-weight:600\">Filter<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== BOARD 3 — LIVE-STATE CONTRACT ===================== -->\n  <section id=\"board-live\" style=\"scroll-margin-top:120px;padding-top:72px\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--npk-color-outline-variant,#2c2738);padding-bottom:18px;margin-bottom:20px\">\n      <span style=\"font-family:'Fraunces';font-weight:800;font-size:15px;color:var(--npk-color-primary,#f4889b)\">03<\u002Fspan>\n      <h2 style=\"font-family:'Fraunces';font-weight:700;font-size:30px;letter-spacing:-.02em;margin:0;color:var(--npk-color-on-surface,#eef2f9)\">The live-state contract<\u002Fh2>\n      <span style=\"font-size:14px;color:var(--npk-color-on-surface-variant,#a2aabc);margin-left:auto;max-width:48ch;text-align:right\">Designed once, reused by every data-driven component. This is what makes NPK <em style=\"font-style:normal;color:var(--npk-color-tertiary)\">live<\u002Fem> rather than presentational.<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-size:13.5px;color:var(--npk-color-on-surface-variant,#a2aabc);margin:0 0 28px;font-family:'JetBrains Mono'\">npk-data-source emits state ∈ {idle · loading · skeleton · empty · error · stale · optimistic · live}. Compose: <span style=\"color:var(--npk-color-on-surface)\">NpkUiState&lt;T&gt;<\u002Fspan> sealed class. Web: <span style=\"color:var(--npk-color-on-surface)\">state<\u002Fspan> attribute + <span style=\"color:var(--npk-color-on-surface)\">npk-state-change<\u002Fspan> event.<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(286px,1fr));gap:16px\">\n\n      <!-- IDLE -->\n      <div style=\"border:1px solid var(--npk-color-outline-variant);border-radius:var(--npk-radius-lg);overflow:hidden;background:var(--npk-color-surface-container)\">\n        <div style=\"padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--npk-color-outline-variant)\"><span style=\"font-family:'JetBrains Mono';font-size:11px;font-weight:600;color:var(--npk-color-on-surface)\">idle<\u002Fspan><span style=\"width:8px;height:8px;border-radius:99px;background:var(--npk-color-on-surface-variant)\"><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:16px\">\n          <div style=\"display:flex;align-items:center;gap:11px\">\n            <div style=\"width:38px;height:38px;border-radius:99px;background:var(--npk-color-primary-container);display:flex;align-items:center;justify-content:center;font-family:'Fraunces';font-weight:700;color:var(--npk-color-on-primary-container)\">AR<\u002Fdiv>\n            <div style=\"flex:1\"><div style=\"font-weight:600;font-size:14px;color:var(--npk-color-on-surface)\">Atlas Robotics<\u002Fdiv><div style=\"font-size:12px;color:var(--npk-color-on-surface-variant)\">$42,800 MRR · 210 seats<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:var(--npk-color-on-surface-variant);margin-top:14px\">Settled data. Full interaction enabled.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- LOADING -->\n      <div style=\"border:1px solid var(--npk-color-outline-variant);border-radius:var(--npk-radius-lg);overflow:hidden;background:var(--npk-color-surface-container)\">\n        <div style=\"padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--npk-color-outline-variant)\"><span style=\"font-family:'JetBrains Mono';font-size:11px;font-weight:600;color:var(--npk-color-on-surface)\">loading<\u002Fspan><span style=\"width:8px;height:8px;border-radius:99px;background:var(--npk-color-primary);animation:npk-pulse 1.2s infinite\"><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:16px\">\n          <div style=\"position:relative;height:4px;border-radius:99px;background:var(--npk-color-surface-container-highest);overflow:hidden;margin-bottom:18px\"><div style=\"position:absolute;top:0;height:100%;border-radius:99px;background:var(--npk-color-primary);animation:npk-indet 1.4s var(--npk-motion-easing-standard) infinite\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:center;gap:11px;padding:6px 0\">\n            <div style=\"width:22px;height:22px;border-radius:99px;border:2.5px solid var(--npk-color-surface-container-highest);border-top-color:var(--npk-color-primary);animation:npk-spin .8s linear infinite\"><\u002Fdiv>\n            <span style=\"font-size:12.5px;color:var(--npk-color-on-surface-variant)\">Fetching…<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:var(--npk-color-on-surface-variant);margin-top:12px\">Determinate bar when progress known; spinner + indeterminate otherwise.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- SKELETON -->\n      <div style=\"border:1px solid var(--npk-color-outline-variant);border-radius:var(--npk-radius-lg);overflow:hidden;background:var(--npk-color-surface-container)\">\n        <div style=\"padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--npk-color-outline-variant)\"><span style=\"font-family:'JetBrains Mono';font-size:11px;font-weight:600;color:var(--npk-color-on-surface)\">skeleton<\u002Fspan><span style=\"width:8px;height:8px;border-radius:99px;background:var(--npk-color-primary);animation:npk-pulse 1.2s infinite\"><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:16px\">\n          <div style=\"display:flex;align-items:center;gap:11px\">\n            <div style=\"width:38px;height:38px;border-radius:99px;background:linear-gradient(90deg,var(--npk-color-surface-container-high) 25%,var(--npk-color-surface-container-highest) 37%,var(--npk-color-surface-container-high) 63%);background-size:200% 100%;animation:npk-shimmer 1.5s infinite\"><\u002Fdiv>\n            <div style=\"flex:1;display:flex;flex-direction:column;gap:7px\">\n              <div style=\"height:11px;width:70%;border-radius:4px;background:linear-gradient(90deg,var(--npk-color-surface-container-high) 25%,var(--npk-color-surface-container-highest) 37%,var(--npk-color-surface-container-high) 63%);background-size:200% 100%;animation:npk-shimmer 1.5s infinite\"><\u002Fdiv>\n              <div style=\"height:10px;width:90%;border-radius:4px;background:linear-gradient(90deg,var(--npk-color-surface-container-high) 25%,var(--npk-color-surface-container-highest) 37%,var(--npk-color-surface-container-high) 63%);background-size:200% 100%;animation:npk-shimmer 1.5s infinite\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:var(--npk-color-on-surface-variant);margin-top:14px\">Layout-preserving placeholder. Matches final content shape to prevent reflow.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- EMPTY -->\n      <div style=\"border:1px solid var(--npk-color-outline-variant);border-radius:var(--npk-radius-lg);overflow:hidden;background:var(--npk-color-surface-container)\">\n        <div style=\"padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--npk-color-outline-variant)\"><span style=\"font-family:'JetBrains Mono';font-size:11px;font-weight:600;color:var(--npk-color-on-surface)\">empty<\u002Fspan><span style=\"width:8px;height:8px;border-radius:99px;background:var(--npk-color-on-surface-variant)\"><\u002Fspan><\u002Fdiv>\n        <div style=\"padding:18px 16px;text-align:center\">\n          <div style=\"width:42px;height:42px; ial<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"border:1px solid var(--npk-color-outline-variant);border-radius:var(--npk-radius-lg);padding:26px;background:var(--npk-color-surface-container)\">\n            <div style=\"display:inline-flex;width:24px;height:24px;border-radius:6px;background:var(--npk-color-tertiary);color:var(--npk-color-on-tertiary);align-items:center;justify-content:center;font:700 12px 'JetBrains Mono';margin-bottom:14px\">E<\u002Fdiv>\n            <div style=\"font-family:'Fraunces';font-weight:700;font-size:18px;color:var(--npk-color-on-surface)\">Enterprise<\u002Fdiv>\n            <div style=\"font-family:'Fraunces';font-weight:800;font-size:34px;color:var(--npk-color-on-surface);margin:8px 0 2px\">Custom<\u002Fdiv>\n            <div style=\"font-size:12px;color:var(--npk-color-on-surface-variant);margin-bottom:18px\">everything in Pro, plus<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:9px;font-size:13px;color:var(--npk-color-on-surface)\">\n              <span style=\"color:var(--npk-color-tertiary)\">✓ Agentic UI + tool-call rendering<\u002Fspan><span style=\"color:var(--npk-color-tertiary)\">✓ Pivot/OLAP grid, Gantt<\u002Fspan><span style=\"color:var(--npk-color-tertiary)\">✓ Governance: audit, RBAC, PII mask<\u002Fspan><span style=\"color:var(--npk-color-tertiary)\">✓ White-label + priority SLA<\u002Fspan>\n            <\u002Fdiv>\n            <button style=\"width:100%;margin-top:22px;border:1.5px solid var(--npk-color-tertiary);background:transparent;color:var(--npk-color-tertiary);font:600 14px 'Hanken Grotesk';padding:11px;border-radius:var(--npk-radius-button,12px);cursor:pointer\">Talk to sales<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- closing token summary -->\n    <div style=\"margin-top:48px;padding:28px 32px;border:1px dashed var(--npk-color-outline);border-radius:var(--npk-radius-lg);background:var(--npk-color-surface-container)\">\n      <div style=\"font-family:'Fraunces';font-weight:700;font-size:16px;color:var(--npk-color-on-surface);margin-bottom:14px\">Token namespace — implement against these<\u002Fdiv>\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap;font-family:'JetBrains Mono';font-size:11.5px\">\n        <span style=\"padding:5px 11px;border-radius:6px;background:var(--npk-color-surface-container-highest);color:var(--npk-color-on-surface)\">--npk-color-*<\u002Fspan>\n        <span style=\"padding:5px 11px;border-radius:6px;background:var(--npk-color-surface-container-highest);color:var(--npk-color-on-surface)\">--npk-space-*<\u002Fspan>\n        <span style=\"padding:5px 11px;border-radius:6px;background:var(--npk-color-surface-container-highest);color:var(--npk-color-on-surface)\">--npk-radius-*<\u002Fspan>\n        <span style=\"padding:5px 11px;border-radius:6px;background:var(--npk-color-surface-container-highest);color:var(--npk-color-on-surface)\">--npk-elevation-*<\u002Fspan>\n        <span style=\"padding:5px 11px;border-radius:6px;background:var(--npk-color-surface-container-highest);color:var(--npk-color-on-surface)\">--npk-motion-*<\u002Fspan>\n        <span style=\"padding:5px 11px;border-radius:6px;background:var(--npk-color-surface-container-highest);color:var(--npk-color-on-surface)\">--npk-type-*<\u002Fspan>\n        <span style=\"padding:5px 11px;border-radius:6px;background:var(--npk-color-surface-container-highest);color:var(--npk-color-on-surface)\">--npk-size-*<\u002Fspan>\n        <span style=\"padding:5px 11px;border-radius:6px;background:var(--npk-color-surface-container-highest);color:var(--npk-color-on-surface)\">--npk-state-*<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:12px;color:var(--npk-color-on-surface-variant);margin-top:14px\">Single source → CSS custom properties (Web) + <span style=\"font-family:'JetBrains Mono';color:var(--npk-color-on-surface)\">NpkTheme<\u002Fspan> / <span style=\"font-family:'JetBrains Mono';color:var(--npk-color-on-surface)\">MaterialTheme.colorScheme<\u002Fspan> (Compose). Components: <span style=\"font-family:'JetBrains Mono';color:var(--npk-color-on-surface)\">NpkButton<\u002Fspan> ⇄ <span style=\"font-family:'JetBrains Mono';color:var(--npk-color-on-surface)\">npk-button<\u002Fspan>.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!--BOARDS-->\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900},&quot;primaryHue&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Crimson&quot;,&quot;Rose&quot;,&quot;Terracotta&quot;,&quot;Amber&quot;,&quot;Forest&quot;,&quot;Azure&quot;,&quot;Indigo&quot;],&quot;default&quot;:&quot;Crimson&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    mode:'dark', skin:'expressive', density:'comfortable',\n    sortKey:'mrr', sortDir:'desc', live:true, tick:0, rows:[],\n    feed:[], optimisticName:'', toastUp:false, mTrack:0\n  };\n\n  componentDidMount(){\n    this.seedRows();\n    this.seedFeed();\n    this._iv = setInterval(()=>{ if(this.state.live) this.tickLive(); }, 2000);\n  }\n  componentWillUnmount(){ if(this._iv) clearInterval(this._iv); }\n\n  set(k,v){ this.setState({[k]:v}); }\n  toggleLive(){ this.setState(s=>({live:!s.live})); }\n\n  // ---------- palette ----------\n  palette(skin){\n    const ex = skin==='expressive';\n    const tone=(h,c,l)=>`oklch(${l} ${c} ${h})`;\n    const cs = ex?1:0.5;\n    // \"Offside\" warm-paper skin: vivid crimson accent, warm cream ink. Accent stays tweakable; surfaces stay warm paper.\n    const PRIMARIES={\n      'Crimson':[14,.205], 'Rose':[6,.185], 'Terracotta':[34,.155],\n      'Amber':[66,.135], 'Forest':[152,.13], 'Azure':[242,.16], 'Indigo':[266,.16]\n    };\n    const pr = PRIMARIES[this.props.primaryHue] || PRIMARIES['Crimson'];\n    const baseP = ex? rRadius:'99px',flex:'none',display:'flex',alignItems:'center',justifyContent:'center',\n          font:\"700 11px 'Fraunces',sans-serif\",background:'var(--npk-color-secondary-container)',color:'var(--npk-color-on-secondary-container)'},\n        init:r.co.split(' ').map(w=>w[0]).join('').slice(0,2),\n        planStyle:{fontSize:'12px',fontWeight:600,color:planColor[r.plan]},\n        mrrStyle:{textAlign:'right',padding:'0 14px',font:\"600 13px 'JetBrains Mono',monospace\",color: flash?'var(--npk-color-on-primary-container)':'var(--npk-color-on-surface)'},\n        seatsStyle:{textAlign:'right',padding:'0 14px',fontSize:'13px',color:'var(--npk-color-on-surface-variant)'},\n        healthVal:r.health,\n        healthBar:{height:'5px',borderRadius:'99px',width:r.health+'%',background: r.health>80?'var(--npk-color-success)':r.health>65?'var(--npk-color-warning)':'var(--npk-color-error)'},\n        dot:{width:'8px',height:'8px',borderRadius:'99px',background:statusColor[r.status],\n          animation: r.status==='live'?'npk-livedot 1.8s infinite':'none'}\n      };\n    });\n    const gridTotal='$'+this.state.rows.reduce((s,r)=>s+r.mrr,0).toLocaleString();\n\n    return {\n      themeVars:t, sampleThemes, showcaseThemes,\n      gridCols, gridRows, gridTotal,\n      gridCaps:['sorting','multi-filter','grouping','inline-edit','virtual scroll','streaming rows','column pinning','CSV / XLSX export','keyboard nav','row selection'],\n      contrastRows,\n      live:this.state.live, liveToggle:()=>this.toggleLive(),\n      liveLabel:this.state.live?'● Streaming':'⏸ Paused',\n      liveBtnStyle:{display:'inline-flex',alignItems:'center',gap:'7px',border:'1px solid '+(this.state.live?'var(--npk-color-success)':'var(--npk-color-outline)'),background:this.state.live?'var(--npk-color-success-container)':'transparent',color:this.state.live?'var(--npk-color-on-success-container)':'var(--npk-color-on-surface-variant)',font:\"600 12px 'Hanken Grotesk'\",padding:'7px 13px',borderRadius:'var(--npk-radius-button,12px)',cursor:'pointer'},\n      modeSeg:this.seg('mode',[{label:'Dark',value:'dark'},{label:'Light',value:'light'}]),\n      skinSeg:this.seg('skin',[{label:'Expressive',value:'expressive'},{label:'Native',value:'native'}]),\n      densitySeg:this.seg('density',[{label:'Comfortable',value:'comfortable'},{label:'Compact',value:'compact'}]),\n      boardNav, heroChips, ramps, roleSwatches, stateLayers, typeScale, spaceScale, radiusScale, elevScale, motionTracks,\n      densityLabel: density==='compact'?'compact density':'comfortable density',\n      skinLabel: skin==='expressive'?'Expressive':'Platform Native',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
