name: Bug report
description: Report a problem with NativePlatformKit
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please search existing issues first. Do **not** report security
        issues here — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Ideally a minimal code snippet or a failing test.
      placeholder: |
        1. Wrap content in NpkTheme { ... }
        2. Use NpkButton(...)
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include logs, stack traces, or screenshots if relevant.
    validations:
      required: true
  - type: input
    id: npk-version
    attributes:
      label: NativePlatformKit version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Compose BOM, AGP, Kotlin, Android API level / device.
      placeholder: "Compose BOM 2026.06.00, AGP 8.13.2, Kotlin 2.4.0, API 34 emulator"
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This is not a security vulnerability (those go through SECURITY.md).
          required: true
