#
# Enforces the Developer Certificate of Origin: every commit in a PR must carry a Signed-off-by
# trailer (git commit -s). See CONTRIBUTING.md#developer-certificate-of-origin-dco.
name: DCO

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dco:
    name: Check sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on every commit
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          status=0
          for commit in $(git rev-list "$base".."$head"); do
            if ! git show -s --format=%B "$commit" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              subject=$(git show -s --format=%s "$commit")
              echo "::error::Missing 'Signed-off-by' on $commit ($subject). Use 'git commit -s'."
              status=1
            fi
          done
          if [ "$status" -ne 0 ]; then
            echo "Amend with: git rebase --signoff origin/main && git push --force-with-lease"
          fi
          exit $status
