# Robolectric configuration shared by all JVM-side tests in this module.
#
# NATIVE graphics (real Skia rendering) is required for Roborazzi screenshot tests to draw Compose
# content; without it Robolectric falls back to a no-op canvas and screenshots come out blank.
#
# Pinned to SDK 34, whose Robolectric native-graphics support is the most battle-tested. (The
# library still compiles against SDK 36; this only controls the emulated runtime for tests.)
sdk=34
graphicsMode=NATIVE
